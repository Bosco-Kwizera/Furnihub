{% extends 'base.html' %}
{% load static %}

{% block title %}Register - FurniHub{% endblock %}

{% block extra_css %}
<style>
    /* Register Page - Dark Luxury Theme */
    .register-card {
        background: var(--mahogany);
        border: 1px solid rgba(212, 168, 83, 0.12);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
    }
    
    .register-card .card-header {
        background: var(--walnut);
        border-bottom: 1px solid rgba(212, 168, 83, 0.12);
        padding: 1.5rem;
        text-align: center;
    }
    
    .register-card .card-header h3 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.75rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: var(--ivory);
        margin: 0;
    }
    
    .register-card .card-body {
        padding: 2rem;
    }
    
    /* Form Elements */
    .form-label {
        font-family: 'Jost', sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--parchment);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .form-label i {
        color: var(--gold);
        font-size: 0.8rem;
        width: 20px;
    }
    
    /* Password strength indicator */
    .password-strength {
        margin-top: 0.5rem;
        height: 4px;
        border-radius: 2px;
        transition: all 0.3s ease;
    }
    
    .strength-text {
        font-family: 'Jost', sans-serif;
        font-size: 0.65rem;
        margin-top: 0.5rem;
        display: block;
    }
    
    /* Fix for input text visibility while typing */
    .form-control {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(212, 168, 83, 0.2);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-family: 'Jost', sans-serif;
        font-size: 1rem;
        font-weight: 500;
        color: #f5f0e8 !important;
        transition: all 0.3s ease;
        caret-color: var(--gold);
    }
    
    .form-control:focus {
        background: rgba(0, 0, 0, 0.5);
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15);
        outline: none;
        color: #ffffff !important;
    }
    
    /* Make text visible while typing */
    .form-control:active,
    .form-control:focus,
    .form-control:not(:placeholder-shown) {
        color: #ffffff !important;
        font-weight: 500;
    }
    
    /* Ensure input text is always visible */
    input.form-control {
        color: #ffffff !important;
    }
    
    input.form-control:focus {
        color: #ffffff !important;
    }
    
    /* Placeholder styling */
    .form-control::placeholder {
        color: #a08f7a !important;
        opacity: 0.8 !important;
        font-weight: 400 !important;
        letter-spacing: 0.02em !important;
    }
    
    .form-control:focus::placeholder {
        color: #c9bda8 !important;
        opacity: 0.5 !important;
    }
    
    /* Register Button */
    .btn-register {
        background: var(--gold);
        border: none;
        border-radius: 40px;
        padding: 0.8rem;
        font-family: 'Jost', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--espresso);
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 0.5rem;
    }
    
    .btn-register:hover {
        background: var(--gold-light);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 168, 83, 0.3);
    }
    
    /* Divider */
    .register-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
    }
    
    .register-divider::before,
    .register-divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid rgba(212, 168, 83, 0.1);
    }
    
    .register-divider span {
        font-family: 'Jost', sans-serif;
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--smoke);
        padding: 0 1rem;
    }
    
    /* Login Link */
    .login-link {
        font-family: 'Jost', sans-serif;
        font-size: 0.8rem;
        color: var(--smoke);
        text-align: center;
        margin-top: 1rem;
    }
    
    .login-link a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }
    
    .login-link a:hover {
        color: var(--gold-light);
        text-decoration: underline;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .register-card .card-body {
            padding: 1.5rem;
        }
        
        .register-card .card-header {
            padding: 1.25rem;
        }
        
        .register-card .card-header h3 {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="register-card">
                <div class="card-header">
                    <h3>Create Account</h3>
                </div>
                <div class="card-body">
                    <form method="POST" id="registerForm">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-user"></i> Username
                            </label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="Choose a username" required autocomplete="off">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-envelope"></i> Email Address
                            </label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="your@email.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Create a password" required>
                            <div id="passwordStrength" class="password-strength"></div>
                            <span id="strengthText" class="strength-text"></span>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-check-circle"></i> Confirm Password
                            </label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                                   placeholder="Confirm your password" required>
                            <div id="passwordMatch" style="font-family: 'Jost', sans-serif; font-size: 0.65rem; margin-top: 0.5rem;"></div>
                        </div>
                        
                        <button type="submit" class="btn-register" id="registerBtn">
                            <i class="fas fa-user-plus me-2"></i> Create Account
                        </button>
                    </form>
                    
                    <div class="register-divider">
                        <span>Already have an account?</span>
                    </div>
                    
                    <div class="login-link">
                        <a href="{% url 'accounts:login' %}">Sign in to your account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Password strength checker
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const strengthDiv = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('strengthText');
    const matchDiv = document.getElementById('passwordMatch');
    const registerBtn = document.getElementById('registerBtn');
    
    function checkPasswordStrength(password) {
        let strength = 0;
        let message = '';
        let color = '';
        
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;
        
        switch(strength) {
            case 0:
            case 1:
                message = 'Very Weak';
                color = '#e87b6a';
                break;
            case 2:
                message = 'Weak';
                color = '#e8a86a';
                break;
            case 3:
                message = 'Fair';
                color = '#e8c86a';
                break;
            case 4:
                message = 'Good';
                color = '#9ccc65';
                break;
            case 5:
                message = 'Strong';
                color = '#4caf81';
                break;
        }
        
        if (password.length === 0) {
            message = '';
            strengthDiv.style.width = '0%';
        } else {
            strengthDiv.style.width = (strength * 20) + '%';
            strengthDiv.style.background = color;
            strengthDiv.style.borderRadius = '2px';
        }
        
        strengthText.textContent = message;
        strengthText.style.color = color;
        
        return strength;
    }
    
    function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        if (confirm.length === 0) {
            matchDiv.textContent = '';
            return false;
        }
        
        if (password === confirm) {
            matchDiv.textContent = '✓ Passwords match';
            matchDiv.style.color = '#4caf81';
            return true;
        } else {
            matchDiv.textContent = '✗ Passwords do not match';
            matchDiv.style.color = '#e87b6a';
            return false;
        }
    }
    
    passwordInput.addEventListener('input', function() {
        checkPasswordStrength(this.value);
        checkPasswordMatch();
    });
    
    confirmInput.addEventListener('input', function() {
        checkPasswordMatch();
    });
    
    // Form validation before submit
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        if (password !== confirm) {
            e.preventDefault();
            alert('Passwords do not match. Please try again.');
            return false;
        }
        
        if (password.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters long.');
            return false;
        }
    });
</script>
{% endblock %}
