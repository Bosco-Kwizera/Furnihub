{% extends 'base.html' %}
{% load static %}

{% block title %}Login - FurniHub{% endblock %}

{% block extra_css %}
<style>
    /* Login Page - Dark Luxury Theme */
    .login-card {
        background: var(--mahogany);
        border: 1px solid rgba(212, 168, 83, 0.12);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
    }
    
    .login-card .card-header {
        background: var(--walnut);
        border-bottom: 1px solid rgba(212, 168, 83, 0.12);
        padding: 1.5rem;
        text-align: center;
    }
    
    .login-card .card-header h3 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.75rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: var(--ivory);
        margin: 0;
    }
    
    .login-card .card-body {
        padding: 2rem;
    }
    
    /* Form Elements */
    .form-label {
        font-family: 'Jost', sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--parchment);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .form-label i {
        color: var(--gold);
        font-size: 0.8rem;
        width: 20px;
    }
    
    /* Fix for input text visibility while typing */
    .form-control {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(212, 168, 83, 0.2);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-family: 'Jost', sans-serif;
        font-size: 1rem;
        font-weight: 500;
        color: #f5f0e8 !important;
        transition: all 0.3s ease;
        caret-color: var(--gold);
    }
    
    .form-control:focus {
        background: rgba(0, 0, 0, 0.5);
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15);
        outline: none;
        color: #ffffff !important;
    }
    
    /* Make text visible while typing */
    .form-control:active,
    .form-control:focus,
    .form-control:not(:placeholder-shown) {
        color: #ffffff !important;
        font-weight: 500;
    }
    
    /* Ensure input text is always visible */
    input.form-control {
        color: #ffffff !important;
    }
    
    input.form-control:focus {
        color: #ffffff !important;
    }
    
    /* Placeholder styling */
    .form-control::placeholder {
        color: #a08f7a !important;
        opacity: 0.8 !important;
        font-weight: 400 !important;
        letter-spacing: 0.02em !important;
    }
    
    .form-control:focus::placeholder {
        color: #c9bda8 !important;
        opacity: 0.5 !important;
    }
    
    /* Login Button */
    .btn-login {
        background: var(--gold);
        border: none;
        border-radius: 40px;
        padding: 0.8rem;
        font-family: 'Jost', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--espresso);
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 0.5rem;
    }
    
    .btn-login:hover {
        background: var(--gold-light);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 168, 83, 0.3);
    }
    
    /* Divider */
    .login-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
    }
    
    .login-divider::before,
    .login-divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid rgba(212, 168, 83, 0.1);
    }
    
    .login-divider span {
        font-family: 'Jost', sans-serif;
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--smoke);
        padding: 0 1rem;
    }
    
    /* Register Link */
    .register-link {
        font-family: 'Jost', sans-serif;
        font-size: 0.8rem;
        color: var(--smoke);
        text-align: center;
        margin-top: 1rem;
    }
    
    .register-link a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }
    
    .register-link a:hover {
        color: var(--gold-light);
        text-decoration: underline;
    }
    
    /* Forgot Password Link */
    .forgot-link {
        text-align: right;
        margin-top: -0.5rem;
        margin-bottom: 1rem;
    }
    
    .forgot-link a {
        font-family: 'Jost', sans-serif;
        font-size: 0.7rem;
        color: var(--smoke);
        text-decoration: none;
        transition: color 0.2s;
    }
    
    .forgot-link a:hover {
        color: var(--gold);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .login-card .card-body {
            padding: 1.5rem;
        }
        
        .login-card .card-header {
            padding: 1.25rem;
        }
        
        .login-card .card-header h3 {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="login-card">
                <div class="card-header">
                    <h3>Welcome Back</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-user"></i> Username
                            </label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="Enter your username" required autocomplete="off">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter your password" required>
                        </div>
                        
                        <div class="forgot-link">
                            <a href="#">Forgot password?</a>
                        </div>
                        
                        <button type="submit" class="btn-login">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </form>
                    
                    <div class="login-divider">
                        <span>New to FurniHub?</span>
                    </div>
                    
                    <div class="register-link">
                        Don't have an account? <a href="{% url 'accounts:register' %}">Create an account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
