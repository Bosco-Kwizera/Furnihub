{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - FurniHub{% endblock %}

{% block extra_css %}
<style>
    .reset-card {
        background: var(--mahogany);
        border: 1px solid rgba(212, 168, 83, 0.12);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
    }
    
    .reset-card .card-header {
        background: var(--walnut);
        border-bottom: 1px solid rgba(212, 168, 83, 0.12);
        padding: 1.5rem;
        text-align: center;
    }
    
    .reset-card .card-header h3 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.75rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: var(--ivory);
        margin: 0;
    }
    
    .reset-card .card-body {
        padding: 2rem;
    }
    
    .form-label {
        font-family: 'Jost', sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--parchment);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .form-label i {
        color: var(--gold);
        font-size: 0.8rem;
    }
    
    .form-control {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(212, 168, 83, 0.2);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-family: 'Jost', sans-serif;
        font-size: 1rem;
        font-weight: 500;
        color: #f5f0e8 !important;
        transition: all 0.3s ease;
        width: 100%;
    }
    
    .form-control:focus {
        background: rgba(0, 0, 0, 0.5);
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15);
        outline: none;
        color: #ffffff !important;
    }
    
    .form-control::placeholder {
        color: #a08f7a !important;
        opacity: 0.7 !important;
    }
    
    .btn-reset {
        background: var(--gold);
        border: none;
        border-radius: 40px;
        padding: 0.8rem;
        font-family: 'Jost', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--espresso);
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 0.5rem;
    }
    
    .btn-reset:hover {
        background: var(--gold-light);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 168, 83, 0.3);
    }
    
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }
    
    .back-link a {
        font-family: 'Jost', sans-serif;
        font-size: 0.8rem;
        color: var(--smoke);
        text-decoration: none;
        transition: color 0.2s;
    }
    
    .back-link a:hover {
        color: var(--gold);
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="reset-card">
                <div class="card-header">
                    <h3>Reset Password</h3>
                </div>
                <div class="card-body">
                    <p style="font-family: 'Jost', sans-serif; font-size: 0.85rem; color: var(--smoke); text-align: center; margin-bottom: 1.5rem;">
                        Enter your email address and we'll send you a link to reset your password.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-envelope"></i> Email Address
                            </label>
                            <input type="email" class="form-control" name="email" 
                                   placeholder="your@email.com" required autofocus>
                        </div>
                        
                        <button type="submit" class="btn-reset">
                            <i class="fas fa-paper-plane me-2"></i> Send Reset Link
                        </button>
                    </form>
                    
                    <div class="back-link">
                        <a href="{% url 'accounts:login' %}">
                            <i class="fas fa-arrow-left me-2"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
