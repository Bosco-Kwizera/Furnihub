{% extends 'admin_dashboard/base_admin.html' %}
{% load static %}

{% block admin_title %}Add Category{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="admin-table" style="padding: 1.5rem;">
            <h2 style="font-family: 'Cormorant Garamond', serif; color: var(--ivory); margin-bottom: 1.5rem;">
                <i class="fas fa-folder-plus me-2" style="color: var(--gold);"></i>Add New Category
            </h2>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label">Category Name *</label>
                    <input type="text" name="name" class="form-control" required 
                           style="background: rgba(0,0,0,0.3); border: 1px solid rgba(212,168,83,0.2); border-radius: 10px; padding: 0.75rem; color: var(--ivory);">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Parent Category</label>
                    <select name="parent" class="form-select" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(212,168,83,0.2); border-radius: 10px; padding: 0.75rem; color: var(--ivory);">
                        <option value="">None (Top Level Category)</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">Select a parent category if this is a subcategory</small>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea name="description" rows="4" class="form-control" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(212,168,83,0.2); border-radius: 10px; padding: 0.75rem; color: var(--ivory);"></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Category Image (Optional)</label>
                    <input type="file" name="image" class="form-control" accept="image/*" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(212,168,83,0.2); border-radius: 10px; padding: 0.75rem; color: var(--ivory);">
                </div>
                
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" checked>
                        <label class="form-check-label" for="is_active" style="color: var(--parchment);">
                            Active (visible on website)
                        </label>
                    </div>
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn-admin btn-admin-primary">
                        <i class="fas fa-save me-2"></i> Save Category
                    </button>
                    <a href="{% url 'admin_dashboard:categories_list' %}" class="btn-admin">
                        <i class="fas fa-times me-2"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
